<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HathiTrust Browser</title>
    <link type="text/css" rel="stylesheet" href="https://use.typekit.net/fkc5snf.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
          font-family: verdigris-mvb-pro-text;
          background: #fff;
          color: #000;
          min-height: 100vh;
          font-size: 10pt;
      }

      .page-frame {
          margin: calc(100vh/9) calc(100vw/9) calc(200vh/9);
      }

      /* ── Spread (Van de Graaf canon) ── */
      /* Treat viewport as a two-page spread: w = vw/2 per page            */
      /* outer padding = 2w/9 = vw/9, top = w/9 = vw/18, bottom = 2w/9   */

      header {
          padding: 1.25rem 0;
          border-bottom: 1px dashed #000;
      }

      .controls {
          display: flex;
          gap: 0.5rem;
          flex-wrap: wrap;
          align-items: center;
      }

      .controls input[type="search"],
      .controls select {
          padding: 0.3rem 0.55rem;
          border: 1px solid #000;
          border-radius: 0;
          /* font-size: 0.8rem; */
          background: #fff;
          color: #000;
          font-family: inherit;
          -webkit-appearance: none;
          appearance: none;
      }
      .controls input[type="search"] {
          flex: 1;
          min-width: 200px;
      }
      .controls input[type="search"]::placeholder { color: #aaa; }
      .controls input[type="search"]:focus,
      .controls select:focus {
          outline: none;
          box-shadow: 0 0 0 1px #000;
      }

      /* ── Status bar ── */
      .status-bar {
          text-align: center;
          padding: 0.45rem 0 0;
          color: #888;
          font-style: italic;
          margin-bottom: 1em;
      }

      /* ── Grid ── */
      #grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      }

      /* ── Cards ── */
      .card {
          background: #fff;
          display: flex;
          flex-direction: column;
          text-decoration: none;
          color: #000;
          cursor: pointer;
          /* margin: 0.5em; */
          padding: 0.5em;
      }

      .card:hover {
          background-color: hsla(26, 100%, 38%, 0.8);
          color: white;
      }

      .card:hover .cover {
          filter: grayscale(100%);
          mix-blend-mode: multiply;
      }

      .cover {
          width: 100%;
          aspect-ratio: 2 / 3;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
      }
      .cover img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
      }

      /* Dot-pattern placeholder */
      .cover-fallback {
          display: none;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          padding: 0.75rem;
          text-align: center;
          background-color: #fff;
          background-image: radial-gradient(circle, #d0d0d0 0.75px, transparent 0.75px);
          background-size: 5px 5px;
      }
      .cover-fallback .fallback-title {
          /* font-size: 0.58rem; */
          color: #222;
          line-height: 1.35;
          display: -webkit-box;
          -webkit-line-clamp: 6;
          -webkit-box-orient: vertical;
          overflow: hidden;
          background: rgba(255,255,255,0.82);
          padding: 0.25rem 0.35rem;
      }

      .card-body {
          padding: 0.5rem 0;
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 0.15rem;
      }

      .card-title {
          /* font-size: 0.73rem; */
          line-height: 1.3;
          display: -webkit-box;
          -webkit-line-clamp: 3;
          -webkit-box-orient: vertical;
          overflow: hidden;
      }

      .card-author {
          font-style: italic;
          /* color: #444; */
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
      }

      .card-meta {
          margin-top: auto;
          padding-top: 0.3rem;
          /* color: #888; */
          letter-spacing: 0.02em;
      }

      /* ── Pagination ── */
      .pagination {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 1.75rem;
          padding: 1rem 0;
          flex-wrap: wrap;
      }
      #pagination { padding-bottom: 1rem; }

      .pag-buttons {
          display: flex;
          align-items: stretch;
      }

      .pag-buttons button,
      .pag-buttons .ellipsis {
          padding: 0.4rem 0.8rem;
          border: 1px solid #000;
          margin-left: -1px;
          /* font-size: 0.78rem; */
          font-family: inherit;
          background: #fff;
          color: #000;
          cursor: pointer;
          min-width: 2.4rem;
          display: flex;
          align-items: center;
          justify-content: center;
          line-height: 1;
      }
      .pag-buttons button.pag-prev,
      .pag-buttons button.pag-next {
          font-style: italic;
          padding-left: 1rem;
          padding-right: 1rem;
          letter-spacing: 0.01em;
      }
      .pag-buttons button:hover:not(:disabled) { background: #000; color: #fff; }
      .pag-buttons button:disabled { color: #ccc; cursor: not-allowed; }
      .pag-buttons button.current { background: #000; color: #fff; font-weight: bold; }
      .pag-buttons .ellipsis { color: #bbb; cursor: pointer; font-style: italic; }
      .pag-buttons .ellipsis:hover { background: #f0f0f0; color: #000; }
      .pag-buttons input.ellipsis-input {
          z-index: 2;
          /* padding: 0.4rem 0.3rem; */
          /* width: 3.8rem; */
          font-family: inherit;
          font-size: inherit;
          text-align: center;
          /* background: white; */
          -moz-appearance: textfield;
          appearance: textfield;
      }
      .pag-buttons input.ellipsis-input::-webkit-inner-spin-button,
      .pag-buttons input.ellipsis-input::-webkit-outer-spin-button { -webkit-appearance: none; }


      /* ── State messages ── */
      .state-message {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 5rem 2rem;
          gap: 1rem;
          color: #888;
          text-align: center;
          grid-column: 1 / -1;
          font-style: italic;
          /* font-size: 0.9rem; */
      }

      .spinner {
          width: 22px;
          height: 22px;
          border: 1px solid #ccc;
          border-top-color: #000;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg { font-size: 0.9rem; font-style: normal; }
      .error-hint { font-size: 0.8rem; }

      /* ── Viewer modal ── */
      #viewer-modal {
          position: fixed;
          inset: 0;
          z-index: 100;
          display: flex;
          flex-direction: column;
      }
      #viewer-modal[hidden] { display: none; }

      #viewer-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.45);
      }

      #viewer-panel {
          position: relative;
          z-index: 1;
          display: flex;
          flex-direction: column;
          width: 92vw;
          height: 92vh;
          margin: auto;
          background: #fff;
          border: 1px solid #000;
          overflow: hidden;
          min-height: 0;
      }

      #viewer-header {
          display: flex;
          align-items: center;
          gap: 1rem;
          padding: 0.45rem 0.75rem;
          border-bottom: 1px solid #000;
          flex-shrink: 0;
      }

      #viewer-info { flex: 1; min-width: 0; }
      #viewer-title {
          font-size: 0.85rem;
          font-weight: bold;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }
      #viewer-author {
          font-size: 0.7rem;
          font-style: italic;
          color: #555;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }

      #viewer-close {
          flex-shrink: 0;
          background: #fff;
          border: 1px solid #000;
          color: #000;
          padding: 0.2rem 0.6rem;
          font-size: 1rem;
          line-height: 1;
          cursor: pointer;
          font-family: inherit;
      }
      #viewer-close:hover { background: #000; color: #fff; }

      #viewer-frame {
          flex: 1;
          min-height: 0;
          border: none;
          width: 100%;
          display: block;
      }
    </style>
  </head>
  <body>

    <div class="page-frame">
      <header>
        <div class="controls">
          <input type="search" id="search" placeholder="Search title or author..." autocomplete="off" spellcheck="false">
          <select id="lang-filter" title="Filter by language">
            <option value="">All languages</option>
          </select>
          <select id="sort" title="Sort order">
            <option value="">Sort: Default</option>
            <option value="title ASC">Title A→Z</option>
            <option value="title DESC">Title Z→A</option>
            <option value="rights_date_used ASC NULLS LAST">Year (oldest first)</option>
            <option value="CASE WHEN rights_date_used = 9999 THEN NULL ELSE rights_date_used END DESC NULLS LAST">Year (newest first)</option>
          </select>
        </div>
      </header>

      <div class="status-bar">
        <span id="page-info"></span>
      </div>

      <div id="pagination-top" class="pagination"></div>
      <div id="grid"></div>
      <div id="pagination" class="pagination"></div>
    </div>

    <div id="viewer-modal" hidden>
      <div id="viewer-overlay"></div>
      <div id="viewer-panel">
        <div id="viewer-header">
          <div id="viewer-info">
            <div id="viewer-title"></div>
            <div id="viewer-author"></div>
          </div>
          <button id="viewer-close">&times;</button>
        </div>
        <iframe id="viewer-frame" src="" allowfullscreen></iframe>
      </div>
    </div>

    <script type="module">
      import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@latest/+esm';

      const PAGE_SIZE = 24;
      const PARQUET_URL = new URL('raiden.parquet', window.location.href).href;

      let conn = null;
      let currentPage = 0;
      let searchTimer = null;
      let isLoading = false;

      // ── DuckDB init ──────────────────────────────────────────────────────────────

      async function initDuckDB() {
          setStatus('');

          const bundles = duckdb.getJsDelivrBundles();
          const bundle = await duckdb.selectBundle(bundles);

          const workerUrl = URL.createObjectURL(
              new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
          );
          const worker = new Worker(workerUrl);
          const logger = new duckdb.VoidLogger();
          const db = new duckdb.AsyncDuckDB(logger, worker);
          await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
          URL.revokeObjectURL(workerUrl);

          conn = await db.connect();
      }

      // ── Query helpers ─────────────────────────────────────────────────────────────

      function buildWhere() {
          const search = document.getElementById('search').value.trim();
          const lang   = document.getElementById('lang-filter').value;
          const parts  = [`access = 'allow'`];

          if (search) {
              const q = search.replace(/'/g, "''");
              parts.push(`(title ILIKE '%${q}%' OR author ILIKE '%${q}%')`);
          }
          if (lang) parts.push(`lang = '${lang.replace(/'/g,"''")}'`);

          return 'WHERE ' + parts.join(' AND ');
      }

      function buildOrderBy() {
          const sort = document.getElementById('sort').value;
          return sort ? `ORDER BY ${sort}` : '';
      }

      function fromParquet(cols = '*') {
          return `FROM read_parquet('${PARQUET_URL}')`;
      }

      async function runQuery(sql) {
          const table = await conn.query(sql);
          return table.toArray().map(row => {
              const obj = {};
              for (const f of table.schema.fields) {
                  const v = row[f.name];
                  obj[f.name] = typeof v === 'bigint' ? Number(v) : v;
              }
              return obj;
          });
      }

      async function fetchBooks(page) {
          const where   = buildWhere();
          const orderBy = buildOrderBy();
          const offset  = page * PAGE_SIZE;
          const sql = `
    SELECT htid, title, author, rights_date_used, lang
    ${fromParquet()}
    ${where}
    ${orderBy}
    LIMIT ${PAGE_SIZE} OFFSET ${offset}
  `;
          return runQuery(sql);
      }

      async function fetchCount() {
          const sql = `SELECT COUNT(*) AS n ${fromParquet()} ${buildWhere()}`;
          const rows = await runQuery(sql);
          return rows[0].n;
      }

      async function fetchLanguages() {
          const sql = `
    SELECT lang, COUNT(*) AS n
    ${fromParquet()}
    WHERE lang IS NOT NULL AND lang != ''
    GROUP BY lang
    ORDER BY n DESC
    LIMIT 60
  `;
          return runQuery(sql);
      }

      // ── Rendering ────────────────────────────────────────────────────────────────

      function esc(s) {
          return String(s ?? '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;');
      }

      function coverUrl(htid) {
          return `https://babel.hathitrust.org/cgi/imgsrv/image?id=${encodeURIComponent(htid)};orient=0;size=25;seq=1`;
      }

      function embedUrl(htid) {
          return `https://babel.hathitrust.org/cgi/pt?id=${encodeURIComponent(htid)}&ui=embed`;
      }

      function cleanTitle(t) {
          if (!t) return 'Untitled';
          const slash = t.indexOf(' / ');
          return (slash !== -1 ? t.slice(0, slash) : t).trim();
      }

      function formatYear(y) {
          if (!y || y === 9999 || y === 0) return null;
          return String(y);
      }

      function renderGrid(books) {
          const grid = document.getElementById('grid');

          if (!books.length) {
              grid.innerHTML = `<div class="state-message" style="grid-column:1/-1"><p>No books found for this search.</p></div>`;
              return;
          }

          grid.innerHTML = books.map(book => {
              const year  = formatYear(book.rights_date_used);
              const title = cleanTitle(book.title);

              return `<a class="card" href="${esc(embedUrl(book.htid))}"
         data-htid="${esc(book.htid)}"
         data-title="${esc(title)}"
         data-author="${esc(book.author || '')}">
      <div class="cover">
        <img src="${esc(coverUrl(book.htid))}" loading="lazy" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="cover-fallback">
          <div class="fallback-title">${esc(title)}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(title)}</div>
        ${book.author ? `<div class="card-author">${esc(book.author)}</div>` : ''}
        <div class="card-meta">${[year, book.lang].filter(Boolean).map(esc).join(' · ')}</div>
      </div>
    </a>`;
          }).join('');
      }

      function renderPagination(page, total) {
          const pages = Math.ceil(total / PAGE_SIZE);

          if (pages <= 1) {
              document.getElementById('pagination-top').innerHTML = '';
              document.getElementById('pagination').innerHTML = '';
              return;
          }

          const window_size = 5;
          let lo = Math.max(0, page - Math.floor(window_size / 2));
          let hi = Math.min(pages - 1, lo + window_size - 1);
          if (hi - lo < window_size - 1) lo = Math.max(0, hi - window_size + 1);

          let btns = `<button class="pag-prev" data-p="${page - 1}" ${page === 0 ? 'disabled' : ''}>&larr;</button>`;
          if (lo > 0) {
              btns += `<button data-p="0">1</button>`;
              if (lo > 1) btns += `<button class="ellipsis" data-ellipsis>…</button>`;
          }
          for (let i = lo; i <= hi; i++) {
              btns += `<button data-p="${i}" class="${i === page ? 'current' : ''}">${(i + 1).toLocaleString()}</button>`;
          }
          if (hi < pages - 1) {
              if (hi < pages - 2) btns += `<button class="ellipsis" data-ellipsis>…</button>`;
              btns += `<button data-p="${pages - 1}">${pages.toLocaleString()}</button>`;
          }
          btns += `<button class="pag-next" data-p="${page + 1}" ${page >= pages - 1 ? 'disabled' : ''}>&rarr;</button>`;

          const pagHTML = () => `<div class="pag-buttons">${btns}</div>`;

          document.getElementById('pagination-top').innerHTML = pagHTML();
          document.getElementById('pagination').innerHTML = pagHTML();

          for (const id of ['pagination-top', 'pagination']) {
              const container = document.getElementById(id);

              container.querySelectorAll('button[data-ellipsis]').forEach(btn => {
                  btn.addEventListener('click', () => {
                      const input = document.createElement('input');
                      input.type = 'number';
                      input.min = 1;
                      input.max = pages;
                      input.placeholder = '…';
                      input.className = 'ellipsis-input';
                      btn.replaceWith(input);
                      input.focus();
                      input.addEventListener('keydown', e => {
                          if (e.key === 'Enter') {
                              const p = parseInt(input.value, 10) - 1;
                              if (!isNaN(p) && p >= 0 && p < pages) { currentPage = p; refresh(); }
                          }
                          if (e.key === 'Escape') { input.replaceWith(btn); }
                      });
                      input.addEventListener('blur', () => { input.replaceWith(btn); });
                  });
              });
          }
      }

      // ── State display ─────────────────────────────────────────────────────────────

      function setStatus(msg) {
          document.getElementById('page-info').textContent = msg;
      }

      function showLoading() {
          document.getElementById('grid').innerHTML =
              `<div class="state-message" style="grid-column:1/-1">
       <div class="spinner"></div>
     </div>`;
          document.getElementById('pagination-top').innerHTML = '';
          document.getElementById('pagination').innerHTML = '';
          setStatus('');
      }

      function showError(err) {
          document.getElementById('grid').innerHTML =
              `<div class="state-message" style="grid-column:1/-1">
       <p class="error-msg">Error: ${esc(err.message)}</p>
       <p class="error-hint">Make sure you're serving this over HTTP, not file://</p>
     </div>`;
          document.getElementById('pagination-top').innerHTML = '';
          document.getElementById('pagination').innerHTML = '';
          setStatus('Error');
          console.error(err);
      }

      // ── Main refresh ──────────────────────────────────────────────────────────────

      async function refresh() {
          if (!conn || isLoading) return;
          isLoading = true;

          showLoading();

          try {
              const [books, total] = await Promise.all([
                  fetchBooks(currentPage),
                  fetchCount(),
              ]);

              const start = currentPage * PAGE_SIZE + 1;
              const end   = Math.min((currentPage + 1) * PAGE_SIZE, total);

              document.getElementById('page-info').textContent =
                  total > 0 ? `${start.toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()}` : '';

              renderGrid(books);
              renderPagination(currentPage, total);

              requestAnimationFrame(() => window.applyVanDeGraafPadding?.());
              window.scrollTo({ top: 0, behavior: 'smooth' });
          } catch (err) {
              showError(err);
          } finally {
              isLoading = false;
          }
      }

      // ── Language dropdown ─────────────────────────────────────────────────────────

      async function populateLanguages() {
          try {
              const langs = await fetchLanguages();
              const sel = document.getElementById('lang-filter');
              for (const { lang, n } of langs) {
                  const opt = document.createElement('option');
                  opt.value = lang;
                  opt.textContent = `${lang}  (${Number(n).toLocaleString()})`;
                  sel.appendChild(opt);
              }
          } catch (_) { /* non-fatal */ }
      }

      // ── Bootstrap ────────────────────────────────────────────────────────────────

      (async () => {
          showLoading();

          try {
              await initDuckDB();
          } catch (err) {
              showError(err);
              return;
          }

          await refresh();
          populateLanguages(); // runs concurrently in background
      })();

      // ── Event listeners ───────────────────────────────────────────────────────────

      document.getElementById('search').addEventListener('input', () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => { currentPage = 0; refresh(); }, 400);
      });

      for (const id of ['lang-filter', 'sort']) {
          document.getElementById(id).addEventListener('change', () => {
              currentPage = 0;
              refresh();
          });
      }

      // ── Viewer modal ──────────────────────────────────────────────────────────────

      const modal      = document.getElementById('viewer-modal');
      const viewerFrame = document.getElementById('viewer-frame');

      function openViewer(htid, title, author) {
          document.getElementById('viewer-title').textContent = title;
          document.getElementById('viewer-author').textContent = author;
          viewerFrame.src = embedUrl(htid);
          modal.hidden = false;
          document.body.style.overflow = 'hidden';
      }

      function closeViewer() {
          modal.hidden = true;
          viewerFrame.src = '';
          document.body.style.overflow = '';
      }

      document.getElementById('viewer-close').addEventListener('click', closeViewer);
      document.getElementById('viewer-overlay').addEventListener('click', closeViewer);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

      document.getElementById('grid').addEventListener('click', e => {
          const card = e.target.closest('a.card[data-htid]');
          if (!card) return;
          e.preventDefault();
          openViewer(card.dataset.htid, card.dataset.title, card.dataset.author);
      });

      for (const id of ['pagination-top', 'pagination']) {
          document.getElementById(id).addEventListener('click', e => {
              const btn = e.target.closest('button[data-p]');
              if (!btn) return;
              const p = parseInt(btn.dataset.p, 10);
              if (!isNaN(p)) { currentPage = p; refresh(); }
          });
      }
    </script>
  </body>
</html>
